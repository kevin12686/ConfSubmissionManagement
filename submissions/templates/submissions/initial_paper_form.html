{% extends "submissions/base.html" %}
{% block title %}Paper Master Record{% endblock %}
{% block content %}
<h1 class="h3 mb-3">{% if paper %}Edit{% else %}Add{% endif %} Paper Master Record</h1>
<form method="post" class="card">
    <div class="card-body">
        {% csrf_token %}
        {{ form.as_p }}
    </div>
    <div class="card-footer d-flex gap-2">
        <button class="btn btn-primary">Save</button>
        <a class="btn btn-outline-secondary" href="{% url 'submissions:initial_paper_list' %}">Cancel</a>
    </div>
</form>
{% endblock %}
