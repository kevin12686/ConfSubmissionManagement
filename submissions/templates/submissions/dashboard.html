{% extends "submissions/base.html" %}
{% block title %}Dashboard{% endblock %}
{% block content %}
<div id="dashboard-summary"
     hx-get="{% url 'submissions:dashboard_summary' %}"
     hx-trigger="load"
     hx-swap="outerHTML">
    <div class="cfm-page-header">
        <div>
            <h1 class="h3 cfm-page-title">Dashboard</h1>
            <div class="cfm-page-subtitle">Loading publication readiness...</div>
        </div>
    </div>
    <div class="cfm-section" aria-busy="true">
        <span class="cfm-loading-indicator htmx-request">Calculating publication readiness...</span>
    </div>
</div>
{% endblock %}
