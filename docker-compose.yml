services:
  web:
    build:
      context: .
    image: conference-final-manager:local
    restart: unless-stopped
    labels:
      com.conferencefinalmanager.host-data-dir: "${SMS_DATA_DIR:-./data}"
    ports:
      - "${SMS_BIND_HOST:-127.0.0.1}:${SMS_PORT:-8000}:8000"
    environment:
      DJANGO_HOST: 0.0.0.0
      DJANGO_PORT: 8000
      SMS_DATABASE_PATH: /app/data/db.sqlite3
      SMS_MEDIA_ROOT: /app/data/media
      SMS_SECRET_KEY: ${SMS_SECRET_KEY:-local-dev-only-change-if-exposed}
      SMS_DEBUG: ${SMS_DEBUG:-1}
      SMS_ALLOWED_HOSTS: ${SMS_ALLOWED_HOSTS:-127.0.0.1,localhost,testserver}
      SMS_RUN_MIGRATIONS: ${SMS_RUN_MIGRATIONS:-1}
      SMS_WEB_WORKERS: ${SMS_WEB_WORKERS:-1}
      SMS_WEB_THREADS: ${SMS_WEB_THREADS:-4}
      SMS_WEB_TIMEOUT: ${SMS_WEB_TIMEOUT:-300}
    volumes:
      - .:/app
      - sms_data:/app/data

volumes:
  sms_data:
